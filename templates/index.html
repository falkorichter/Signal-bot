<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signal FAQ Bot — Dashboard</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <style>
    body { background: #f0f2f5; }

    /* Navbar */
    .navbar-brand { font-weight: 700; letter-spacing: .03em; }
    #refresh-badge {
      font-size: .75rem; padding: .25em .6em;
      transition: background-color .3s;
    }
    #refresh-badge.refreshing { background-color: #0d6efd !important; }

    /* Stat cards */
    .stat-card { border: none; border-radius: 12px; }
    .stat-card .display-6 { font-size: 2rem; font-weight: 700; }

    /* Session cards */
    .session-card {
      border-radius: 12px;
      border: none;
      border-left: 5px solid #dee2e6;
      transition: box-shadow .2s;
    }
    .session-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.09); }
    .session-card.replied  { border-left-color: #198754; }
    .session-card.error    { border-left-color: #dc3545; }
    .session-card.question { border-left-color: #0d6efd; }
    .session-card.pending  { border-left-color: #ffc107; }

    /* New-session highlight */
    @keyframes highlightIn {
      from { background-color: #fff3cd; }
      to   { background-color: #fff; }
    }
    .session-card.new-arrival { animation: highlightIn 2s ease-out forwards; }

    /* Pipeline steps */
    .pipeline { border-top: 1px solid #e9ecef; padding-top: .75rem; margin-top: .75rem; }
    .step {
      display: flex; gap: .75rem; align-items: flex-start;
      padding: .45rem .5rem; border-radius: 6px;
    }
    .step:nth-child(even) { background: #f8f9fa; }
    .step-icon { font-size: 1.1rem; line-height: 1.4; flex-shrink: 0; width: 1.5rem; text-align: center; }
    .step-label { font-size: .78rem; color: #6c757d; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; flex-shrink: 0; width: 7rem; padding-top: .1rem; }
    .step-body { font-size: .88rem; white-space: pre-wrap; word-break: break-word; flex: 1; }
    .step-body.mono { font-family: monospace; }
    .step-missing { color: #adb5bd; font-style: italic; }

    /* Message text preview */
    .msg-preview {
      font-size: .95rem; color: #212529;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Sender chip */
    .sender-chip {
      background: #e9ecef; border-radius: 20px;
      padding: .15em .7em; font-size: .8rem; font-family: monospace;
    }

    /* Toggle pipeline button */
    .btn-pipeline { font-size: .78rem; padding: .2em .7em; }

    /* Empty state */
    #empty-state { display: none; }
  </style>
</head>
<body>

<!-- ─── Navbar ─────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container-fluid px-4">
    <span class="navbar-brand mb-0 h1">📡 Signal FAQ Bot</span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-light" style="font-size:.82rem;" id="last-updated">Loading…</span>
      <span id="refresh-badge" class="badge bg-secondary">⟳ live</span>
    </div>
  </div>
</nav>

<!-- ─── Main ────────────────────────────────────────────────────────────── -->
<div class="container-fluid px-4 py-4" style="max-width:1100px;">

  <!-- Stats row -->
  <div class="row g-3 mb-4" id="stats-row">
    <!-- injected by JS -->
  </div>

  <!-- Session list -->
  <div id="sessions-list"></div>

  <!-- Empty state -->
  <div id="empty-state" class="text-center py-5 text-muted">
    <div style="font-size:3rem;">🤖</div>
    <h5 class="mt-3">No sessions yet</h5>
    <p class="mb-0">Messages processed by the bot will appear here automatically.</p>
  </div>

</div>

<script>
"use strict";

// ─── Utilities ────────────────────────────────────────────────────────────

function relativeTime(isoString) {
  if (!isoString) return "";
  const diffMs = Date.now() - new Date(isoString).getTime();
  const s = Math.round(diffMs / 1000);
  if (s < 5)  return "just now";
  if (s < 60) return `${s}s ago`;
  const m = Math.round(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.round(m / 60);
  if (h < 24) return `${h}h ago`;
  return new Date(isoString).toLocaleDateString();
}

function escHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function badge(text, cls) {
  return `<span class="badge bg-${cls}">${escHtml(text)}</span>`;
}

// ─── Stats row ────────────────────────────────────────────────────────────

function renderStats(stats) {
  const cards = [
    { label: "Total messages", value: stats.total,        icon: "💬", cls: "primary" },
    { label: "Questions",      value: stats.questions,     icon: "❓", cls: "info"    },
    { label: "Replies sent",   value: stats.replied,       icon: "✅", cls: "success" },
    { label: "Errors",         value: stats.errors,        icon: "❌", cls: "danger"  },
  ];
  const row = document.getElementById("stats-row");
  row.innerHTML = cards.map(c => `
    <div class="col-6 col-md-3">
      <div class="card stat-card shadow-sm h-100">
        <div class="card-body text-center py-3">
          <div style="font-size:1.8rem;">${c.icon}</div>
          <div class="display-6 text-${c.cls}">${c.value}</div>
          <div class="text-muted" style="font-size:.82rem;">${c.label}</div>
        </div>
      </div>
    </div>
  `).join("");
}

// ─── Pipeline step renderer ───────────────────────────────────────────────

function step(icon, label, body, extraClass = "") {
  const bodyHtml = body != null
    ? `<span class="step-body mono">${escHtml(body)}</span>`
    : `<span class="step-body step-missing">—</span>`;
  return `
    <div class="step ${extraClass}">
      <span class="step-icon">${icon}</span>
      <span class="step-label">${label}</span>
      ${bodyHtml}
    </div>`;
}

function renderPipeline(s) {
  let html = '<div class="pipeline">';

  // Step 1 — Received
  html += step("📨", "Received", s.message_text);

  // Step 2 — Question?
  if (s.is_question === true) {
    html += step("🔍", "Question?",
      "✅ Yes — will generate a response");
  } else if (s.is_question === false) {
    html += step("🔍", "Question?",
      "⬜ No — message ignored");
  } else {
    html += step("🔍", "Question?", null);
  }

  // Step 3 — Appointments (only if question)
  if (s.is_question === true) {
    html += step("📅", "Appointments",
      s.appointments_text || null);
  }

  // Step 4 — LLM response (only if question)
  if (s.is_question === true) {
    html += step("🤖", "LLM output", s.llm_response || null);
  }

  // Step 5 — Message sent
  if (s.replied) {
    html += step("💬", "Sent DM",
      s.final_message ? s.final_message.slice(0, 500) + (s.final_message.length > 500 ? "…" : "") : null);
  } else if (s.final_message && !s.replied) {
    html += step("💬", "Sent DM", s.final_message ? "(send failed)" : null);
  }

  // Step 6 — Error
  if (s.error) {
    html += step("❌", "Error", s.error, "text-danger");
  }

  html += "</div>";
  return html;
}

// ─── Session card renderer ────────────────────────────────────────────────

function sessionCardClass(s) {
  if (s.error)         return "error";
  if (s.replied)       return "replied";
  if (s.is_question)   return "question";
  if (s.is_question === false) return "";
  return "pending";
}

function renderSessionCard(s, isNew) {
  const cardCls = sessionCardClass(s);
  const newCls  = isNew ? "new-arrival" : "";
  const uid     = `pipeline-${s.id.replace(/-/g, "")}`;

  let badges = "";
  if (s.is_question === true)  badges += badge("Question", "primary") + " ";
  if (s.is_question === false) badges += badge("Not a question", "secondary") + " ";
  if (s.replied)               badges += badge("Replied ✅", "success") + " ";
  if (s.error)                 badges += badge("Error", "danger") + " ";
  if (s.is_question === null)  badges += badge("Pending…", "warning text-dark") + " ";

  return `
    <div class="card session-card shadow-sm mb-3 ${cardCls} ${newCls}" data-id="${escHtml(s.id)}">
      <div class="card-body py-3">

        <!-- Header row -->
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="sender-chip">${escHtml(s.sender || "unknown")}</span>
            ${s.group_id ? `<span class="text-muted" style="font-size:.78rem;">group: ${escHtml(s.group_id.slice(0,12))}…</span>` : ""}
            ${badges}
          </div>
          <span class="text-muted" style="font-size:.78rem;" title="${escHtml(s.timestamp)}">
            ${relativeTime(s.timestamp)}
          </span>
        </div>

        <!-- Message preview -->
        <p class="msg-preview mb-2">${escHtml(s.message_text)}</p>

        <!-- Toggle pipeline -->
        <button class="btn btn-outline-secondary btn-pipeline"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#${uid}"
                aria-expanded="false">
          Show pipeline ▾
        </button>

        <!-- Collapsible pipeline -->
        <div class="collapse" id="${uid}">
          ${renderPipeline(s)}
        </div>

      </div>
    </div>`;
}

// ─── Auto-refresh loop ────────────────────────────────────────────────────

let _knownIds = new Set();

async function refresh() {
  const badge = document.getElementById("refresh-badge");
  badge.classList.add("refreshing");

  try {
    const [sessionsResp, statsResp] = await Promise.all([
      fetch("/api/sessions"),
      fetch("/api/stats"),
    ]);

    if (!sessionsResp.ok || !statsResp.ok) {
      throw new Error(`API error: ${sessionsResp.status} / ${statsResp.status}`);
    }

    const sessions = await sessionsResp.json();
    const stats    = await statsResp.json();

    renderStats(stats);

    const container = document.getElementById("sessions-list");
    const emptyState = document.getElementById("empty-state");

    if (sessions.length === 0) {
      container.innerHTML = "";
      emptyState.style.display = "block";
    } else {
      emptyState.style.display = "none";

      // Detect newly arrived sessions
      const newIds = new Set(sessions.map(s => s.id));
      const arrivals = sessions.filter(s => !_knownIds.has(s.id));
      _knownIds = newIds;

      // Full re-render (simple & reliable for small datasets)
      container.innerHTML = sessions.map(s =>
        renderSessionCard(s, arrivals.some(a => a.id === s.id))
      ).join("");
    }

    const now = new Date().toLocaleTimeString();
    document.getElementById("last-updated").textContent = `Updated ${now}`;

  } catch (err) {
    console.error("Dashboard refresh failed:", err);
    document.getElementById("last-updated").textContent = `⚠ Refresh failed — ${err.message}`;
  } finally {
    badge.classList.remove("refreshing");
  }
}

// Initial load + polling every 5 s
refresh();
setInterval(refresh, 5000);
</script>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  crossorigin="anonymous">
</script>
</body>
</html>
